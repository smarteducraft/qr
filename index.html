<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR 스캐너 (Happy Together) V1.02</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#000; color:#fff; }
    #app { height:100%; width:100%; position:relative; overflow:hidden; }
    video { width:100%; height:100%; object-fit:cover; background:#000; display:block; }

    /* 최소 UI(상태만) */
    #hud {
      position:absolute; left:0; right:0; bottom:0;
      padding:12px;
      background: linear-gradient(transparent, rgba(0,0,0,.55));
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      font-size:14px;
      line-height:1.4;
    }
    #status { font-weight:700; }

    #tapToStart {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55);
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      text-align:center;
      padding:24px;
    }
    #tapToStart button{
      border:0; border-radius:12px; padding:14px 18px;
      font-weight:800; font-size:16px; cursor:pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline muted></video>

    <div id="tapToStart">
      <div>
        <div style="font-size:18px;font-weight:900;margin-bottom:10px;">QR 스캔 준비</div>
        <div style="opacity:.9;margin-bottom:14px;">
          카메라/전체화면/사운드 권한을 위해<br/>아래 버튼을 한 번 눌러주세요.
        </div>
        <button id="startBtn">스캔 시작</button>
      </div>
    </div>

    <div id="hud">
      <div id="status">대기 중…</div>
    </div>
  </div>

  <script>
    // ==========================
    // 기본 기능 설정(유지)
    // ==========================
    const SCAN_INTERVAL_MS = 180;   // 스캔 주기
    const COOLDOWN_MS = 1500;       // 연속 인식 방지
    const HISTORY_KEY = "qr_scan_history_v1";
    const MAX_HISTORY = 8;

    // QR이 URL이 아닐 때 붙일 기본 URL (필요 시 설정)
    // 예) const BASE_URL = "https://example.com/view?code=";
    const BASE_URL = ""; // 비워두면 "QR이 URL이 아닌 경우 이동 불가"

    // ==========================
    // 엘리먼트/상태
    // ==========================
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const tapLayer = document.getElementById("tapToStart");
    const startBtn = document.getElementById("startBtn");

    let stream = null;
    let detector = null;
    let timer = null;

    let lastValue = "";
    let lastTime = 0;
    let navigating = false;

    // ==========================
    // 진동 + 효과음 (유지)
    // ==========================
    let audioCtx = null;

    function vibrate() {
      if (navigator.vibrate) navigator.vibrate([80, 60, 80]);
    }

    function beep() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtx;

        const o = ctx.createOscillator();
        const g = ctx.createGain();

        o.type = "sine";
        o.frequency.value = 880;
        g.gain.value = 0.0001;

        o.connect(g);
        g.connect(ctx.destination);

        const t = ctx.currentTime;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.2, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

        o.start(t);
        o.stop(t + 0.13);
      } catch (e) {}
    }

    // ==========================
    // 유틸(기록 저장/URL 생성 유지)
    // ==========================
    function pushHistory(text) {
      const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      const next = [text, ...arr.filter(x => x !== text)].slice(0, MAX_HISTORY);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
    }

    function makeUrl(raw) {
      const v = (raw || "").trim();
      if (!v) return null;

      // 1) QR 자체가 URL이면 그대로
      if (/^https?:\/\//i.test(v)) return v;

      // 2) URL 스킴 없는 도메인 형태면 https 붙이기
      if (/^[\w.-]+\.[a-z]{2,}([\/?#].*)?$/i.test(v)) return "https://" + v;

      // 3) 그 외는 BASE_URL + raw
      if (!BASE_URL) return null;
      return BASE_URL + encodeURIComponent(v);
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    // ==========================
    // 전체화면 요청 (유지)
    // ==========================
    async function requestFullscreen() {
      const el = document.documentElement;
      if (document.fullscreenElement) return;
      try {
        if (el.requestFullscreen) await el.requestFullscreen();
      } catch (e) {}
    }

    // ==========================
    // 카메라/스캔 (유지 + "즉시 이동" 반영)
    // ==========================
    function initDetector() {
      if (!("BarcodeDetector" in window)) {
        detector = null;
        setStatus("이 브라우저는 QR 기본 인식을 지원하지 않습니다. Chrome/Edge 권장");
        return false;
      }
      try {
        detector = new BarcodeDetector({ formats: ["qr_code"] });
        return true;
      } catch (e) {
        detector = null;
        setStatus("QR 인식기 초기화 실패");
        return false;
      }
    }

    async function startCamera() {
      stopAll();

      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus("카메라를 지원하지 않는 브라우저입니다.");
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        setStatus("스캔 중… QR을 화면에 비춰주세요");
        startScanningLoop();
      } catch (e) {
        setStatus("카메라 실행 실패: HTTPS/권한을 확인하세요");
      }
    }

    function stopAll() {
      navigating = false;
      if (timer) { clearInterval(timer); timer = null; }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function startScanningLoop() {
      if (!detector) return;

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      timer = setInterval(async () => {
        if (navigating) return;
        if (!video.videoWidth || !video.videoHeight) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
          const codes = await detector.detect(canvas);
          if (!codes?.length) return;

          const raw = (codes[0].rawValue || "").trim();
          if (!raw) return;

          const now = Date.now();
          if (raw === lastValue && (now - lastTime) < COOLDOWN_MS) return;
          lastValue = raw; lastTime = now;

          pushHistory(raw);

          const url = makeUrl(raw);
          // 인식 성공: 진동/효과음은 유지
          vibrate(); beep();

          if (!url) {
            setStatus("인식 성공! 그러나 URL로 변환할 수 없습니다 (BASE_URL 설정 필요)");
            // 즉시 다시 스캔 가능하도록 navigating 해제
            navigating = false;
            return;
          }

          // ✅ 변경점: 대기시간 없이 즉시 이동
          navigating = true;
          setStatus("이동 중…");
          location.href = url;

        } catch (e) {
          // 일시적 실패 무시
        }
      }, SCAN_INTERVAL_MS);
    }

    // ==========================
    // 시작 버튼 (사용자 제스처 확보)
    // ==========================
    startBtn.addEventListener("click", async () => {
      await requestFullscreen();

      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();
      } catch (e) {}

      const ok = initDetector();
      if (!ok) return;

      tapLayer.style.display = "none";
      await startCamera();
    });

    tapLayer.addEventListener("click", (e) => {
      if (e.target === startBtn) return;
      startBtn.click();
    });

    window.addEventListener("beforeunload", stopAll);
  </script>
</body>
</html>
